name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff pytest
        # In a real environment we would run: pip install -r requirements.txt
        # For scaffolding, we install the essential test tools first.

    - name: Lint and Format Check (Ruff)
      run: |
        # Fail the build if there are syntax errors or unresolved lint issues
        ruff check .
        ruff format --check .

    - name: Run Stage Unit Tests
      run: |
        # Run pytest across stage folders
        # We will configure test discovery to cover tests/ directory
        pytest tests/
